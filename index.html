<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Auto Code Generator</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin-top: 40px;
  background: #f5f5f5;
}
h1 {
  margin-bottom: 10px;
}
p {
  color: #555;
}
select, button {
  padding: 10px;
  margin: 5px;
  font-size: 14px;
}
button {
  cursor: pointer;
}
pre {
  text-align: left;
  background: #111;
  color: #0f0;
  padding: 15px;
  width: 80%;
  margin: 20px auto;
  overflow-x: auto;
  border-radius: 10px;
  min-height: 120px;
}
#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Auto Code Generator</h1>

<p>
① 言語と用途を選択<br>
② 「コード生成」をクリック<br>
③ コピーまたはダウンロードして使用
</p>

<!-- 状態表示 -->
<p id="status">未選択</p>

<!-- 言語 -->
<select id="language" onchange="updateStatus()">
  <option value="">言語を選択</option>
  <option value="python">Python</option>
  <option value="js">JavaScript</option>
</select>

<!-- 用途 -->
<select id="task" onchange="updateStatus()">
  <option value="">用途を選択</option>
  <option value="api">API取得</option>
  <option value="json">JSON処理</option>
  <option value="file">ファイル読み込み</option>
</select>

<br>

<button onclick="generate()">コード生成</button>
<button onclick="download()">ダウンロード</button>
<button onclick="copy()">コピー</button>

<pre id="output">ここにコードが表示されます</pre>

<script>

function updateStatus() {
  const lang = document.getElementById("language").value;
  const task = document.getElementById("task").value;

  if (!lang || !task) {
    document.getElementById("status").textContent = "未選択";
    return;
  }

  document.getElementById("status").textContent =
    `言語: ${lang} / 用途: ${task}`;
}

function generate() {
  const lang = document.getElementById("language").value;
  const task = document.getElementById("task").value;

  if (!lang || !task) {
    alert("言語と用途を選択してください");
    return;
  }

  let code = "";

  if (lang === "python") {

    if (task === "api") {
      code = `import requests

url = "https://api.github.com"
response = requests.get(url)

if response.status_code == 200:
    print(response.json())
else:
    print("Error:", response.status_code)`;
    }

    if (task === "json") {
      code = `import json

json_string = '{"name":"Alice","age":25}'
data = json.loads(json_string)

print(data["name"])
print(data["age"])`;
    }

    if (task === "file") {
      code = `with open("sample.txt", "r") as f:
    print(f.read())`;
    }
  }

  if (lang === "js") {

    if (task === "api") {
      code = `fetch("https://api.github.com")
  .then(res => res.json())
  .then(data => console.log(data))
  .catch(err => console.error("Error:", err));`;
    }

    if (task === "json") {
      code = `const data = JSON.parse('{"name":"Alice","age":25}');
console.log(data.name);
console.log(data.age);`;
    }

    if (task === "file") {
      code = `const fs = require("fs");

fs.readFile("sample.txt","utf8",(err,data)=>{
  if(err){
    console.log("Error:", err);
  } else {
    console.log(data);
  }
});`;
    }
  }

  document.getElementById("output").textContent = code;
  alert("コード生成完了");
}

function download() {
  const code = document.getElementById("output").textContent;

  if (!code || code === "ここにコードが表示されます") {
    alert("先に生成してください");
    return;
  }

  const blob = new Blob([code], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);

  let ext = (document.getElementById("language").value === "python") ? ".py" : ".js";
  a.download = "snippet" + ext;

  a.click();
}

function copy() {
  const code = document.getElementById("output").textContent;

  if (!code || code === "ここにコードが表示されます") {
    alert("先に生成してください");
    return;
  }

  navigator.clipboard.writeText(code)
    .then(() => alert("コピー完了"))
    .catch(() => alert("コピー失敗"));
}

</script>

</body>
</html>
